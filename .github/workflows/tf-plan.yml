name: terraform plan
on: 
  push:
    paths:
      - '01/**'
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  trraform-init:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      WORKING_DIR: '01'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Config aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with: 
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: |
          echo 'Input directory name: ${{ env.WORKING_DIR}}'
          terraform -chdir=${{ env.WORKING_DIR }} init

      - name: Plan
        run: terraform -chdir=${{ env.WORKING_DIR }} plan -out=tfplan

      - name: Apply
        run: terraform -chdir=${{ env.WORKING_DIR }} apply -auto-approve tfplan

      - name: Destroy
        run: terraform -chdir=${{ env.WORKING_DIR }} destroy -auto-approve 
